<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filmempfehlung</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1c2537;
      --border: #1e2d45;
      --accent: #1a6fff;
      --text: #e8eaf0;
      --text-muted: #7b8ab0;
      --radius: 10px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: rgba(4, 7, 17, 0.95);
      padding: 14px 48px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-top">

    </div>
  </div>

        Weiter zum Fragebogen &#8594;
      </button>

    ];

    const framingTexte = {
      'w': '',
      'x': '87 % der Nutzer in dieser Befragung haben diesen Film mit 4 oder 5 Sternen bewertet.',
      'y': 'Dieser Film hat auf IMDb ein Rating von 8.9?/?10.',
      'z': 'Dieser Film entspricht genau dem Filmtyp, f?r den du dich erfahrungsgem?? begeisterst.'
    };
    const framingStyle = {
      'x': { border: '#1D9E75', bg: 'rgba(29,158,117,0.08)' },
      'y': { border: '#378ADD', bg: 'rgba(55,138,221,0.08)' },
      'z': { border: '#7F77DD', bg: 'rgba(127,119,221,0.08)' }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const filmId = parseInt(urlParams.get('filmId'), 10);
    const bedingung = urlParams.get('condition') || 'w';

    const film = empfehlungsPool.find(f => f.id === filmId);
    const framing = framingTexte[bedingung] || '';
    const style = framingStyle[bedingung];
    const grid = document.getElementById('emp-grid');

    if (film) {
      grid.innerHTML = `
        <img src="${film.poster}" alt="${film.titel}"
          style="width:180px;aspect-ratio:2/3;object-fit:cover;border-radius:10px;flex-shrink:0;"
          onerror="this.style.display='none'">
        <div style="flex:1;padding-top:4px;">
          <div style="font-size:22px;font-weight:700;margin-bottom:6px;">${film.titel}</div>
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">${film.jahr || ''}${film.jahr && film.laufzeit ? ' ? ' : ''}${film.laufzeit ? film.laufzeit + ' Min' : ''}</div>
          ${framing && style ? `<div style="border-left:3px solid ${style.border};background:${style.bg};padding:12px 16px;margin-bottom:18px;"><div style="font-size:14px;line-height:1.6;color:#b0b8cc;">${framing}</div></div>` : ''}
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${film.genres.map(g => `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:11px;padding:3px 10px;">${g}</span>`).join('')}
          </div>
        </div>`;
    } else {
      grid.innerHTML = '<p style="color:var(--text-muted);">Film nicht gefunden.</p>';
    }

    function zurueckZuFragebogen() {
      const ret = urlParams.get('return');
      if (ret) { window.location.href = decodeURIComponent(ret); }
      else { alert('Kein R?ckkehr-Link gefunden. Bitte kehre manuell zum Fragebogen zur?ck.'); }
    }
  </script>
</body>

</html>
